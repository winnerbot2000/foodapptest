name: iOS CI and IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      export_method:
        description: Signed IPA export method for physical-device testing
        required: false
        default: development
        type: choice
        options:
          - development
          - ad-hoc

jobs:
  test:
    name: Build and test shared scheme on an available iPhone simulator
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode and simulator context
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Select simulator destination
        id: simulator
        run: |
          destination_id="$(python3 - <<'PY'
          import json
          import subprocess
          import sys

          devices = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "--json"],
                  text=True,
              )
          )["devices"]

          candidates = []
          for runtime, runtime_devices in devices.items():
              if "iOS" not in runtime:
                  continue

              try:
                  version = tuple(
                      int(part) for part in runtime.rsplit("iOS-", 1)[1].split("-")
                  )
              except (IndexError, ValueError):
                  version = (0,)

              for device in runtime_devices:
                  name = device.get("name", "")
                  udid = device.get("udid")
                  if device.get("isAvailable") and udid and name.startswith("iPhone"):
                      candidates.append((version, name, udid))

          if not candidates:
              sys.exit("No available iPhone simulator destination was found.")

          _, _, udid = max(candidates)
          print(udid)
          PY
          )"

          if [ -z "$destination_id" ]; then
            echo "No available iPhone simulator destination was found."
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using simulator destination id=$destination_id"
          echo "destination=platform=iOS Simulator,id=$destination_id" >> "$GITHUB_OUTPUT"

      - name: Build and Test
        run: |
          set -o pipefail

          if ! xcodebuild clean test \
            -project FoodJournalApp.xcodeproj \
            -scheme FoodJournalApp \
            -sdk iphonesimulator \
            -destination "${{ steps.simulator.outputs.destination }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log; then
            grep -E "^[^:]+:[0-9]+:[0-9]+: error: " xcodebuild.log | while IFS= read -r line; do
              file_path="$(printf '%s' "$line" | sed -E 's#^(.+):([0-9]+):([0-9]+): error: (.*)$#\1#')"
              line_number="$(printf '%s' "$line" | sed -E 's#^(.+):([0-9]+):([0-9]+): error: (.*)$#\2#')"
              column_number="$(printf '%s' "$line" | sed -E 's#^(.+):([0-9]+):([0-9]+): error: (.*)$#\3#')"
              message="$(printf '%s' "$line" | sed -E 's#^(.+):([0-9]+):([0-9]+): error: (.*)$#\4#')"
              echo "::error file=$file_path,line=$line_number,col=$column_number::$message"
            done

            grep -E "xcodebuild: error:|Testing failed:|Test Case '-\\[.*\\]' failed" xcodebuild.log | while IFS= read -r line; do
              echo "::error::$line"
            done

            tail -n 200 xcodebuild.log
            exit 1
          fi

  build-ipa:
    name: Archive and export signed IPA for physical devices
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      IOS_BUNDLE_IDENTIFIER: ${{ vars.IOS_BUNDLE_IDENTIFIER }}
      IOS_EXPORT_METHOD: ${{ github.event.inputs.export_method }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      CERTIFICATE_PATH: ${{ runner.temp }}/build_certificate.p12
      PP_PATH: ${{ runner.temp }}/build_profile.mobileprovision
      PROFILE_PLIST_PATH: ${{ runner.temp }}/build_profile.plist
      KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      EXPORT_OPTIONS_PLIST: ${{ runner.temp }}/ExportOptions.plist
      ARCHIVE_PATH: ${{ runner.temp }}/FoodJournalApp.xcarchive
      EXPORT_PATH: ${{ runner.temp }}/ipa
      KEYCHAIN_PASSWORD: temporary-signing-password

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate signing configuration
        run: |
          if [ -z "$IOS_BUNDLE_IDENTIFIER" ]; then
            echo "::error::Set the IOS_BUNDLE_IDENTIFIER repository variable before running the IPA export job."
            exit 1
          fi

          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$P12_PASSWORD" ] || [ -z "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            echo "::error::Set IOS_CERTIFICATE_P12_BASE64, IOS_CERTIFICATE_PASSWORD, and IOS_PROVISIONING_PROFILE_BASE64 secrets before running the IPA export job."
            exit 1
          fi

      - name: Install signing certificate and provisioning profile
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import base64
          import os
          import pathlib

          pathlib.Path(os.environ["CERTIFICATE_PATH"]).write_bytes(
              base64.b64decode(os.environ["BUILD_CERTIFICATE_BASE64"])
          )
          pathlib.Path(os.environ["PP_PATH"]).write_bytes(
              base64.b64decode(os.environ["BUILD_PROVISION_PROFILE_BASE64"])
          )
          PY

          security cms -D -i "$PP_PATH" > "$PROFILE_PLIST_PATH"

          PROFILE_UUID="$(
            /usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST_PATH"
          )"
          PROFILE_NAME="$(
            /usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST_PATH"
          )"
          TEAM_ID="$(
            /usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$PROFILE_PLIST_PATH"
          )"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "TEAM_ID=$TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Create export options plist
        run: |
          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_IDENTIFIER}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Archive app for iphoneos
        run: |
          set -o pipefail

          xcodebuild clean archive \
            -project FoodJournalApp.xcodeproj \
            -scheme FoodJournalApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_IDENTIFIER" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-archive.log"

      - name: Export signed IPA
        run: |
          set -o pipefail

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-export.log"

          IPA_PATH="$(find "$EXPORT_PATH" -name '*.ipa' -print -quit)"

          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA was produced during export."
            ls -R "$EXPORT_PATH"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodJournalApp-ipa
          path: ${{ runner.temp }}/ipa
          if-no-files-found: error

      - name: Clean up signing assets
        if: always()
        run: |
          rm -f "$CERTIFICATE_PATH" "$PP_PATH" "$PROFILE_PLIST_PATH"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID:-missing}.mobileprovision"
          security delete-keychain "$KEYCHAIN_PATH" || true
