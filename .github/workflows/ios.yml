name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and test shared scheme on an available iPhone simulator
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode and simulator context
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Select simulator destination
        id: simulator
        run: |
          destination_id="$(xcodebuild -project FoodJournalApp.xcodeproj -scheme FoodJournalApp -showdestinations 2>/dev/null | ruby -ne 'if $_ =~ /platform:iOS Simulator, id:([^,]+), OS:[^,]+, name:iPhone/; puts $1.strip; exit; end')"

          if [ -z "$destination_id" ]; then
            echo "No available iPhone simulator destination was found."
            xcodebuild -project FoodJournalApp.xcodeproj -scheme FoodJournalApp -showdestinations
            exit 1
          fi

          echo "Using simulator destination id=$destination_id"
          echo "destination=platform=iOS Simulator,id=$destination_id" >> "$GITHUB_OUTPUT"

      - name: Build and Test
        run: |
          xcodebuild clean test \
            -project FoodJournalApp.xcodeproj \
            -scheme FoodJournalApp \
            -destination "${{ steps.simulator.outputs.destination }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
